# Secret Access Probe — verifies cross-namespace Secret isolation
#
# This probe attempts to read Secrets in the target namespace from a
# ServiceAccount in a different namespace. All reads should be denied (403).
#
# Expected outcome:
#   Pass — all cross-namespace Secret reads were denied (Effective)
#   Fail — one or more Secrets were readable (Ineffective)
apiVersion: sidereal.cloud/v1alpha1
kind: SiderealProbe
metadata:
  name: secret-production
  namespace: sidereal-system
spec:
  profile: secret
  targetNamespace: production
  executionMode: observe
  intervalSeconds: 21600
  controlMappings:
    nist-800-53:
      - SC-28
      - AC-3
