---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: siderealprobes.sidereal.cloud
spec:
  group: sidereal.cloud
  names:
    kind: SiderealProbe
    listKind: SiderealProbeList
    plural: siderealprobes
    shortNames:
    - sp
    singular: siderealprobe
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.probeType
      name: Type
      type: string
    - jsonPath: .spec.executionMode
      name: Mode
      type: string
    - jsonPath: .spec.intervalSeconds
      name: Interval
      type: integer
    - jsonPath: .status.lastOutcome
      name: Last Outcome
      type: string
    - jsonPath: .status.lastControlEffectiveness
      name: Effectiveness
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SiderealProbe is the Schema for the siderealprobes API.
          It defines a security control validation probe configuration.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SiderealProbeSpec defines the desired state of a SiderealProbe.
            properties:
              admissionProbe:
                description: AdmissionProbe contains configuration specific to admission
                  control probes.
                properties:
                  knownBadSpec:
                    description: KnownBadSpec is an operator-provided pod spec that
                      should be rejected.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  targetPolicy:
                    description: TargetPolicy is the name of the specific admission
                      policy to test.
                    type: string
                type: object
              aoAuthorizationRef:
                description: AOAuthorizationRef is the name of the SiderealAOAuthorization
                  resource. Required for detection probes.
                type: string
              controlMappings:
                additionalProperties:
                  items:
                    type: string
                  type: array
                description: ControlMappings maps framework IDs to control IDs for
                  multi-framework compliance tagging.
                type: object
              customProbe:
                description: CustomProbe contains configuration specific to custom
                  probes.
                properties:
                  config:
                    description: Config is opaque JSON configuration passed to the
                      custom probe container.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  image:
                    description: Image is the container image for the custom probe
                      (must be digest-pinned and cosign-signed).
                    type: string
                  serviceAccountName:
                    description: ServiceAccountName is the pre-registered ServiceAccount
                      for this custom probe.
                    type: string
                required:
                - image
                - serviceAccountName
                type: object
              executionMode:
                default: dryRun
                description: |-
                  ExecutionMode controls operational behavior: dryRun (default), observe, or enforce.
                  Transitioning to enforce requires the sidereal-live-executor role.
                enum:
                - dryRun
                - observe
                - enforce
                type: string
              intervalSeconds:
                default: 21600
                description: IntervalSeconds is the time between probe executions.
                format: int32
                maximum: 86400
                minimum: 300
                type: integer
              mitreAttackId:
                description: MitreAttackID is the MITRE ATT&CK technique ID this probe
                  validates against.
                type: string
              probeType:
                description: ProbeType is the type of security control to validate.
                enum:
                - rbac
                - netpol
                - admission
                - secret
                - detection
                - custom
                type: string
              targetNamespace:
                description: TargetNamespace is the explicit namespace to probe. Mutually
                  exclusive with TargetNamespaceSelector.
                type: string
              targetNamespaceSelector:
                description: TargetNamespaceSelector selects namespaces by label.
                  Mutually exclusive with TargetNamespace.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              verificationWindowSeconds:
                default: 60
                description: VerificationWindowSeconds is the window for detection
                  backend polling (detection probes only).
                format: int32
                maximum: 300
                minimum: 10
                type: integer
            required:
            - executionMode
            - intervalSeconds
            - probeType
            type: object
          status:
            description: SiderealProbeStatus defines the observed state of a SiderealProbe.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the probe's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              consecutiveFailures:
                description: ConsecutiveFailures tracks consecutive non-Effective
                  results.
                format: int32
                type: integer
              lastControlEffectiveness:
                description: LastControlEffectiveness is the derived effectiveness
                  of the most recent execution.
                enum:
                - Effective
                - Ineffective
                - Degraded
                - Compromised
                type: string
              lastExecutedAt:
                description: LastExecutedAt is the timestamp of the most recent probe
                  execution.
                format: date-time
                type: string
              lastOutcome:
                description: LastOutcome is the raw outcome of the most recent execution.
                type: string
              recentResults:
                description: RecentResults contains summaries of recent probe executions.
                items:
                  description: ProbeResultSummary is a compact summary of a recent
                    probe result.
                  properties:
                    controlEffectiveness:
                      description: ControlEffectiveness is the derived effectiveness.
                      enum:
                      - Effective
                      - Ineffective
                      - Degraded
                      - Compromised
                      type: string
                    outcome:
                      description: Outcome is the raw probe outcome.
                      type: string
                    resultName:
                      description: ResultName is the name of the SiderealProbeResult
                        resource.
                      type: string
                    timestamp:
                      description: Timestamp is when the probe executed.
                      format: date-time
                      type: string
                  required:
                  - controlEffectiveness
                  - outcome
                  - resultName
                  - timestamp
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
