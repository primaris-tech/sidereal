metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: siderealincidents.sidereal.cloud
spec:
  group: sidereal.cloud
  names:
    kind: SiderealIncident
    listKind: SiderealIncidentList
    plural: siderealincidents
    shortNames:
    - si
    singular: siderealincident
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.severity
      name: Severity
      type: string
    - jsonPath: .spec.probeType
      name: Probe Type
      type: string
    - jsonPath: .spec.targetNamespace
      name: Namespace
      type: string
    - jsonPath: .spec.remediationStatus
      name: Remediation
      type: string
    - jsonPath: .spec.webhookDeliveryStatus
      name: Webhook
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SiderealIncident is a control failure record created when a probe detects
          an ineffective or compromised control in enforce execution mode.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SiderealIncidentSpec defines the content of a control failure
              incident.
            properties:
              controlEffectiveness:
                description: ControlEffectiveness is the effectiveness at the time
                  of incident creation.
                enum:
                - Effective
                - Ineffective
                - Degraded
                - Compromised
                type: string
              controlId:
                description: ControlID is the primary NIST 800-53 control ID.
                type: string
              description:
                description: Description is a human-readable description of the incident.
                type: string
              mitreId:
                description: MitreID is the MITRE ATT&CK technique ID.
                type: string
              probeResultRef:
                description: ProbeResultRef is the name of the SiderealProbeResult
                  that triggered this incident.
                type: string
              probeType:
                description: ProbeType is the type of probe that detected the failure.
                enum:
                - rbac
                - netpol
                - admission
                - secret
                - detection
                - custom
                type: string
              remediationStatus:
                default: Open
                description: RemediationStatus tracks the remediation lifecycle.
                enum:
                - Open
                - InProgress
                - Remediated
                - Accepted
                type: string
              severity:
                description: Severity of the incident.
                enum:
                - Critical
                - High
                - Medium
                - Low
                type: string
              targetNamespace:
                description: TargetNamespace is the namespace where the control failure
                  was detected.
                type: string
              webhookDeliveryStatus:
                default: Pending
                description: WebhookDeliveryStatus tracks IR webhook delivery.
                enum:
                - Pending
                - Delivered
                - Failed
