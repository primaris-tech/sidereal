---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: siderealreports.sidereal.cloud
spec:
  group: sidereal.cloud
  names:
    kind: SiderealReport
    listKind: SiderealReportList
    plural: siderealreports
    shortNames:
    - sr
    singular: siderealreport
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .spec.format
      name: Format
      type: string
    - jsonPath: .spec.schedule
      name: Schedule
      type: string
    - jsonPath: .status.lastGeneratedAt
      name: Last Generated
      type: date
    - jsonPath: .status.lastGenerationStatus
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SiderealReport defines a scheduled report generation configuration.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SiderealReportSpec defines the desired state of a scheduled
              report.
            properties:
              format:
                description: Format is the output format.
                enum:
                - oscal-json
                - pdf
                - markdown
                - csv
                - zip
                type: string
              frameworks:
                description: Frameworks is the list of compliance frameworks to include
                  in the report.
                items:
                  type: string
                type: array
              outputSecret:
                description: OutputSecret is the Kubernetes Secret name where the
                  generated report is stored.
                type: string
              retention:
                default: 5
                description: Retention is the number of historical reports to keep.
                format: int32
                minimum: 1
                type: integer
              schedule:
                description: Schedule is a cron expression for automated generation
                  (e.g., "0 0 1 * *" for monthly).
                type: string
              timeRange:
                description: TimeRange defines the reporting period.
                properties:
                  from:
                    description: From is the start of the reporting period. Defaults
                      to last report or 30 days ago.
                    format: date-time
                    type: string
                  to:
                    description: To is the end of the reporting period. Defaults to
                      now.
                    format: date-time
                    type: string
                type: object
              type:
                description: Type is the kind of report to generate.
                enum:
                - continuous-monitoring
                - poam
                - coverage-matrix
                - evidence-package
                - executive-summary
                type: string
            required:
            - format
            - outputSecret
            - type
            type: object
          status:
            description: SiderealReportStatus defines the observed state of a SiderealReport.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the report's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastGeneratedAt:
                description: LastGeneratedAt is the timestamp of the last successful
                  generation.
                format: date-time
                type: string
              lastGenerationStatus:
                description: LastGenerationStatus indicates the outcome of the last
                  generation attempt.
                enum:
                - Success
                - Failed
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
