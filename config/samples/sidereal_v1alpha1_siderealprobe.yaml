apiVersion: sidereal.cloud/v1alpha1
kind: SiderealProbe
metadata:
  name: rbac-privilege-escalation-prod
  namespace: sidereal-system
  labels:
    sidereal.cloud/probe-type: rbac
    sidereal.cloud/target-namespace: production
spec:
  type: rbac
  targetNamespace: production
  executionMode: observe
  intervalSeconds: 21600  # 6 hours
  mitreAttackId: "T1078"
  nistControls:
    - "AC-2"
    - "AC-3"
    - "AC-6"
    - "AC-6(1)"
    - "AC-6(5)"
  controlMappings:
    nist-800-53:
      - "AC-2"
      - "AC-3"
      - "AC-6"
      - "AC-6(1)"
      - "AC-6(5)"
    cmmc:
      - "AC.L2-3.1.5"
      - "AC.L2-3.1.6"
      - "AC.L2-3.1.7"
