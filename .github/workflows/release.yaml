name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  REGISTRY: ghcr.io/primaris-tech

jobs:
  build-and-push:
    name: Build, Scan, Sign & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # cosign keyless signing via Sigstore OIDC
    environment: release  # requires manual approval gate
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Install build dependencies (Rust FIPS)
        run: sudo apt-get update && sudo apt-get install -y cmake clang pkg-config

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx

      # --- Build all images ---

      - name: Build controller image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: build/Dockerfile.controller
          push: true
          tags: ${{ env.REGISTRY }}/sidereal-controller:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build probe-rbac image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: build/Dockerfile.probe-go
          build-args: PROBE_CMD=probe-rbac
          push: true
          tags: ${{ env.REGISTRY }}/sidereal-probe-rbac:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build probe-secret image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: build/Dockerfile.probe-go
          build-args: PROBE_CMD=probe-secret
          push: true
          tags: ${{ env.REGISTRY }}/sidereal-probe-secret:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build probe-admission image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: build/Dockerfile.probe-go
          build-args: PROBE_CMD=probe-admission
          push: true
          tags: ${{ env.REGISTRY }}/sidereal-probe-admission:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build probe-netpol image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: build/Dockerfile.probe-go
          build-args: PROBE_CMD=probe-netpol
          push: true
          tags: ${{ env.REGISTRY }}/sidereal-probe-netpol:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build probe-detection image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: detection-probe
          file: build/Dockerfile.probe-detection
          push: true
          tags: ${{ env.REGISTRY }}/sidereal-probe-detection:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build bootstrap image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: build/Dockerfile.bootstrap
          push: true
          tags: ${{ env.REGISTRY }}/sidereal-bootstrap:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Trivy scan all images ---

      - name: Trivy scan - controller
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/sidereal-controller:${{ steps.version.outputs.version }}
          exit-code: '1'
          severity: CRITICAL
          format: table

      - name: Trivy scan - probe-rbac
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/sidereal-probe-rbac:${{ steps.version.outputs.version }}
          exit-code: '1'
          severity: CRITICAL
          format: table

      - name: Trivy scan - probe-secret
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/sidereal-probe-secret:${{ steps.version.outputs.version }}
          exit-code: '1'
          severity: CRITICAL
          format: table

      - name: Trivy scan - probe-admission
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/sidereal-probe-admission:${{ steps.version.outputs.version }}
          exit-code: '1'
          severity: CRITICAL
          format: table

      - name: Trivy scan - probe-netpol
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/sidereal-probe-netpol:${{ steps.version.outputs.version }}
          exit-code: '1'
          severity: CRITICAL
          format: table

      - name: Trivy scan - probe-detection
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/sidereal-probe-detection:${{ steps.version.outputs.version }}
          exit-code: '1'
          severity: CRITICAL
          format: table

      - name: Trivy scan - bootstrap
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/sidereal-bootstrap:${{ steps.version.outputs.version }}
          exit-code: '1'
          severity: CRITICAL
          format: table

      # --- Generate SBOMs ---

      - name: Generate Go SBOM (syft)
        run: syft . -o cyclonedx-json=sbom-go.cdx.json

      - name: Generate Rust SBOM (cargo-cyclonedx)
        run: cd detection-probe && cargo cyclonedx --format json && cp sidereal-detection-probe.cdx.json ../sbom-rust.cdx.json

      # --- Sign images and attest SBOMs ---

      - name: Sign and attest all images
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          IMAGES=(
            "sidereal-controller"
            "sidereal-probe-rbac"
            "sidereal-probe-secret"
            "sidereal-probe-admission"
            "sidereal-probe-netpol"
            "sidereal-probe-detection"
            "sidereal-bootstrap"
          )

          for img in "${IMAGES[@]}"; do
            REF="${REGISTRY}/${img}:${VERSION}"

            echo "Signing ${REF}..."
            cosign sign --yes "${REF}"

            echo "Attesting SBOM for ${REF}..."
            if [[ "${img}" == *"detection"* ]]; then
              cosign attest --yes --type cyclonedx --predicate sbom-rust.cdx.json "${REF}"
            else
              cosign attest --yes --type cyclonedx --predicate sbom-go.cdx.json "${REF}"
            fi
          done

      - name: Upload SBOMs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sboms
          path: |
            sbom-go.cdx.json
            sbom-rust.cdx.json

  helm-package:
    name: Package & Push Helm Chart
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.17.3

      - name: Log in to GHCR (Helm OCI)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package Helm chart
        run: |
          helm package deploy/helm/sidereal/ \
            --version "${{ steps.version.outputs.version }}" \
            --app-version "${{ steps.version.outputs.version }}"

      - name: Push Helm chart to GHCR
        run: helm push sidereal-${{ steps.version.outputs.version }}.tgz oci://ghcr.io/primaris-tech/charts

  static-manifests:
    name: Generate Static Manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.17.3

      - name: Generate static manifests for all profiles
        run: make manifests-static

      - name: Upload static manifests
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: static-manifests
          path: deploy/static/
