version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - goimports

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - gosec
    - ineffassign
    - unused
    - misspell
    - revive
    - bodyclose
    - nilerr
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    gosec:
      excludes:
        - G101
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: increment-decrement
        - name: var-naming
        - name: unexported-return
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
      - path: api/v1alpha1/zz_generated\.deepcopy\.go
        linters:
          - all
      - path: internal/report/
        linters:
          - staticcheck
        text: "QF1012|S1039"
      - path: internal/controller/
        linters:
          - staticcheck
        text: "QF1008"
      - linters:
          - misspell
        text: "primaris"
