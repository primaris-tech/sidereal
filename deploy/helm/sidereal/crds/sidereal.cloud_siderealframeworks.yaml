---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: siderealframeworks.sidereal.cloud
spec:
  group: sidereal.cloud
  names:
    kind: SiderealFramework
    listKind: SiderealFrameworkList
    plural: siderealframeworks
    shortNames:
    - sf
    singular: siderealframework
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.frameworkID
      name: Framework ID
      type: string
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .status.mappingCount
      name: Mappings
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Loaded")].status
      name: Loaded
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SiderealFramework defines a compliance framework crosswalk, mapping
          (probeType, NIST 800-53 control) pairs to framework-specific control IDs.
          Apply SiderealFramework resources to add, update, or remove compliance
          frameworks without restarting the controller.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SiderealFrameworkSpec defines the desired state of a SiderealFramework.
            properties:
              frameworkID:
                description: |-
                  FrameworkID is the unique identifier for this compliance framework
                  (e.g., "cmmc", "hipaa", "nist-800-171"). Must match metadata.name.
                  Used as the key in crosswalk resolver output and in SiderealProbeResult
                  controlMappings.
                minLength: 1
                type: string
              frameworkName:
                description: FrameworkName is the human-readable name of the framework.
                minLength: 1
                type: string
              mappings:
                description: Mappings is the list of (probeType, nistControl) → controlIDs
                  entries.
                items:
                  description: |-
                    FrameworkMapping maps a (probe_type, NIST 800-53 control) pair to one or
                    more framework-specific control IDs.
                  properties:
                    controlIDs:
                      description: |-
                        ControlIDs are the framework-specific control identifiers that correspond
                        to this NIST control for this probe type.
                      items:
                        type: string
                      minItems: 1
                      type: array
                    nistControl:
                      description: NISTControl is the NIST SP 800-53 Rev 5 control
                        identifier (e.g., AC-3).
                      minLength: 1
                      type: string
                    probeType:
                      description: ProbeType is the Sidereal probe type this mapping
                        applies to.
                      enum:
                      - rbac
                      - netpol
                      - admission
                      - secret
                      - detection
                      - custom
                      type: string
                  required:
                  - controlIDs
                  - nistControl
                  - probeType
                  type: object
                minItems: 1
                type: array
              version:
                description: |-
                  Version is the version of this crosswalk mapping (semver recommended).
                  Included in the crosswalkVersion field of SiderealProbeResult.
                minLength: 1
                type: string
            required:
            - frameworkID
            - frameworkName
            - mappings
            - version
            type: object
          status:
            description: SiderealFrameworkStatus defines the observed state of a SiderealFramework.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of the framework's
                  state. The Loaded condition is True when the framework is active in the
                  resolver.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              loadedAt:
                description: |-
                  LoadedAt is the timestamp when the framework was last successfully
                  loaded into the crosswalk resolver.
                format: date-time
                type: string
              mappingCount:
                description: MappingCount is the number of mapping entries currently
                  loaded.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
