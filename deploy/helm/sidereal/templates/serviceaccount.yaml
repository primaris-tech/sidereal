{{- $labels := include "sidereal.labels" . -}}
{{- $builtinSAs := list "sidereal-controller" "sidereal-probe-rbac" "sidereal-probe-netpol" "sidereal-probe-admission" "sidereal-probe-secret" "sidereal-probe-detection" "sidereal-discovery" }}
{{- range $sa := $builtinSAs }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $sa }}
  namespace: sidereal-system
  labels:
    {{- $labels | nindent 4 }}
automountServiceAccountToken: false
{{- end }}
{{- range .Values.customProbes.serviceAccounts }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .name }}
  namespace: {{ .namespace | default "sidereal-system" }}
  labels:
    {{- $labels | nindent 4 }}
    sidereal.cloud/custom-probe: "true"
automountServiceAccountToken: false
{{- end }}
