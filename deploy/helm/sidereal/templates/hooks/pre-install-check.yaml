apiVersion: batch/v1
kind: Job
metadata:
  name: sidereal-bootstrap-check
  namespace: sidereal-system
  labels:
    {{- include "sidereal.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 0
  template:
    metadata:
      labels:
        {{- include "sidereal.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bootstrap
    spec:
      serviceAccountName: sidereal-controller
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          image: {{ include "sidereal.bootstrapImage" . }}
          imagePullPolicy: {{ .Values.probe.bootstrapImage.pullPolicy }}
          env:
            - name: ADMISSION_CONTROLLER
              value: {{ .Values.profile.admissionController }}
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
