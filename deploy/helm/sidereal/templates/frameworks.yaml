      nistControl: AC-6
      controlIDs: ["AC-6"]
    - probeType: rbac
      nistControl: "AC-6(5)"
      controlIDs: ["AC-6(5)"]
    - probeType: netpol
      nistControl: AC-4
      controlIDs: ["AC-4"]
    - probeType: netpol
      nistControl: SC-7
      controlIDs: ["SC-7"]
    - probeType: netpol
      nistControl: "SC-7(5)"
      controlIDs: ["SC-7(5)"]
    - probeType: admission
      nistControl: CM-6
      controlIDs: ["CM-6"]
