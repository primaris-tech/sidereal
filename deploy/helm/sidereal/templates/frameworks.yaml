      nistControl: "CM-7(2)"
      controlIDs: ["CM-7(2)"]
    - probeType: admission
      nistControl: "CM-7(5)"
      controlIDs: ["CM-7(5)"]
    - probeType: secret
      nistControl: AC-3
      controlIDs: ["AC-3"]
    - probeType: secret
      nistControl: SC-28
      controlIDs: ["SC-28"]
    - probeType: secret
      nistControl: "SC-28(1)"
      controlIDs: ["SC-28(1)"]
    - probeType: detection
      nistControl: AU-6
      controlIDs: ["AU-6"]
    - probeType: detection
      nistControl: SI-4
      controlIDs: ["SI-4"]
    - probeType: detection
      nistControl: "SI-4(5)"
      controlIDs: ["SI-4(5)"]
    - probeType: custom
      nistControl: CA-7
      controlIDs: ["CA-7"]
