apiVersion: v1
kind: Secret
metadata:
  name: sidereal-hmac-root
  namespace: sidereal-system
  labels:
    {{- include "sidereal.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  # 32 random bytes (256 bits) generated by Helm on first install, base64-encoded
  # for the Secret data field. The keep resource policy prevents deletion on
  # helm uninstall to avoid losing the HMAC chain of trust.
  hmac-root-key: {{ randBytes 32 | quote }}
