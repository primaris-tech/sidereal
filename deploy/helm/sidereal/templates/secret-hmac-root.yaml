apiVersion: v1
kind: Secret
metadata:
  name: sidereal-hmac-root
  namespace: sidereal-system
  labels:
    {{- include "sidereal.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  # Generated by Helm on first install. The keep resource policy prevents
  # deletion on helm uninstall to avoid losing the HMAC chain of trust.
  hmac-root-key: {{ randAlphaNum 32 | b64enc | quote }}
